# Ultron — example configuration (safe to commit). Copy to config.yaml and adjust.
# Empty strings and null use built-in defaults at runtime (see ultron/config.py).

# timezone — IANA name for report headers and date formatting; empty string loads as UTC.
# Example: Europe/Madrid
timezone: ""

discord:
  # ephemeral_default — If true, /summary, /ask_issue, /note default to ephemeral replies (only the user sees them). Null uses default true.
  # Example: true
  ephemeral_default: null

  # issue_metadata_header — If true, /summary and /ask_issue prepend one line (journal note count, total spent hours, last updated) before the model text; the same line is included in the ticket payload sent to the LLM. Null uses default true.
  # Example: true
  issue_metadata_header: null

  # summary_status_redmine — Shown while fetching the ticket from Redmine for /summary and /ask_issue. Empty uses built-in default text.
  # Example: "Fetching ticket from Redmine…"
  summary_status_redmine: ""

  # summary_status_llm — Shown before the LLM call; {model} is replaced with the model name. Empty uses built-in default.
  # Example: "Calling {model}…"
  summary_status_llm: ""

  # llm_chain_skip_status — Template when switching to the next llm_chain provider; placeholders {from_entry}, {from_model}, {reason}, {to_entry}, {to_model}. Empty uses built-in default.
  # Example: "**{from_entry}** failed ({reason}). Trying **{to_entry}**…"
  llm_chain_skip_status: ""

  # llm_chain_all_failed_message — User-visible message when every chain provider fails.
  # Example: "All language model providers failed. Check config and logs."
  llm_chain_all_failed_message: ""

  # nl_commands — If true, allowlisted @mention / reply-to-bot messages are routed by an LLM to allowed commands (requires a configured LLM). Null uses default true. If false, users get a short notice that routing is disabled.
  # Example: true
  nl_commands: null

  # slash_show_llm_option_hints — If true, richer llm_provider autocomplete (endpoint when multiple chain slots; no duplicate model name there) and short llm_model option text pointing to autocomplete + llm_chain. Null uses default false.
  # Example: true
  slash_show_llm_option_hints: null

  new_issues:
    # status_name — Exact Redmine issue status name for /list_new_issues (Administration → Issue statuses). Empty means not configured for listing.
    # Example: New
    status_name: "New/Neu"

    # list_limit — Maximum issues to list with links.
    # Example: 20
    list_limit: null

    # min_age_days — Only issues created at least this many days ago.
    # Example: 2
    min_age_days: null

  registration_log:
    # enabled — Post operational events to a Discord channel when channel_id is set.
    # Example: true
    enabled: true

    # channel_id — Discord integer channel ID for log messages; 0 means disabled even if enabled is true.
    # Example: 1234567890123456789
    # channel_id: 1489308369259991202
    channel_id: 1488608240777302036

    features:
      # startup — Post a line when the bot comes online (if registration_log is enabled).
      # Example: true
      startup: true

      # whitelist_events — Post when users request /token or admins approve (if enabled).
      # Example: true
      whitelist_events: true

  unassigned_open:
    # min_age_days — For /list_unassigned_issues: only issues created at least this many days ago.
    # Example: 1
    min_age_days: null

    # list_limit — Cap how many issues are listed.
    # Example: 20
    list_limit: null

    # closed_status_prefixes — Exclude issues whose current status name equals or starts with any of these (case-insensitive).
    # Example: ["Solved", "Closed", "Rejected"]
    closed_status_prefixes:
      - Solved
      - Closed
      - Rejected

reports:
  # channel_id — Discord channel for scheduled listing posts and the startup summary; 0 disables.
  # Example: 1489308369259991202
  channel_id: 1489308369259991202

  # startup_message_enabled — If true, post a welcome + schedule summary when the bot becomes ready (same channel).
  # Example: true
  startup_message_enabled: true

  # startup_welcome — First line of that post; empty uses a built-in English greeting.
  # Example: "Hello team — automated Redmine digests below."
  startup_welcome: ""

# report_schedule — Ordered jobs: run slash-equivalent listing commands on an interval (hours or interval_days).
# command — list_new_issues | list_unassigned_issues | issues_by_status (issues_by_status requires args.status).
# list_new_issues / list_unassigned_issues use discord.new_issues / discord.unassigned_open (no args).
# Legacy aliases: new_issues → list_new_issues; unassigned_issues → list_unassigned_issues.
# Example: list_new_issues and list_unassigned_issues each every 8h
report_schedule:
  - enabled: true
    command: list_new_issues
    interval_hours: 8
    args: {}
  - enabled: true
    command: list_unassigned_issues
    interval_hours: 8
    args: {}
#   - enabled: true
#     command: issues_by_status
#     interval_hours: 12
#     args:
#       status: "In Progress"

logging:
  # log_read_messages — If true, log full prompts and ticket text (may contain secrets); use only for debugging.
  # Example: false
  log_read_messages: null

# llm_chain — Ordered providers: index 0 is primary, then fallbacks. Empty list [] means use LLM_* variables from .env instead.
# Each entry needs base_url, model, api_key_env; optional name, enabled, timeout_seconds, max_retries.
# model — Single string or ordered list of strings; first is the default model for that provider (slash / autocomplete can pick others when multiple).
llm_chain: []

# Example chain (uncomment and set api_key_env to real env var names holding keys):
# llm_chain:
#   - name: "local-ollama"
#     enabled: true
#     base_url: "http://127.0.0.1:11434/v1"
#     model: ["llama3.2", "mistral"]
#     api_key_env: "OLLAMA_API_KEY"
#     timeout_seconds: 900
#     max_retries: 0
#   - name: "openai-fallback"
#     enabled: true
#     base_url: "https://api.openai.com/v1"
#     model: "gpt-4o-mini"
#     api_key_env: "OPENAI_API_KEY"
#     timeout_seconds: 120
#     max_retries: 2
