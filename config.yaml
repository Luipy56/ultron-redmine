# Ultron runtime config (non-secret). Secrets stay in .env — never commit .env.
#
# Checklist before production:
#   [ ] timezone — IANA name for report headers (below: UTC; e.g. Europe/Madrid)
#   [ ] reports.channel_id — Discord channel for scheduled reports (0 = disabled)
#   [ ] discord.ephemeral_default — true if slash replies should be private
#   [ ] logging.log_read_messages — keep false unless debugging (logs PII/prompts)
#   [ ] llm_chain — set api_key_env vars in .env (OPENAI_API_KEY, OPENROUTER_API_KEY, OLLAMA_API_KEY=ollama)
#
# Discord channel ID: enable Developer Mode → right‑click channel → Copy ID (17–19 digit integer).

timezone: UTC

logging:
  # true = logs full prompts and ticket text (secrets/PII). Use only when debugging.
  log_read_messages: false

discord:
  # true = only the user sees /summary and /note replies; false = public in channel
  ephemeral_default: false
  summary_status_redmine: "Fetching ticket from Redmine…"
  summary_status_llm: "Passing the task to {model}…"
  # When llm_chain falls back to the next provider, edit the status message (placeholders: from_entry, from_model, to_entry, to_model, reason).
  llm_chain_skip_status: "**{from_entry}** ({from_model}) failed: {reason}. Trying **{to_entry}** ({to_model})…"
  # Shown when every llm_chain entry has failed (slash /summary and /note).
  llm_chain_all_failed_message: "All configured language model providers failed (URLs, keys, quotas, or network). Check config.yaml `llm_chain` and the bot logs."
  # Spanish examples (uncomment and remove the English lines above if you prefer):
  # summary_status_redmine: "Obteniendo el ticket de Redmine…"
  # summary_status_llm: "Delegando en {model}…"

reports:
  # REPLACE: your Discord channel ID (integer), or 0 to disable scheduled reports.
  channel_id: 0

schedules:
  abandoned:
    enabled: true
    interval_hours: 24
    max_days_without_update: 14
    max_issues: 50

  stale_new:
    enabled: true
    interval_hours: 24
    min_age_hours: 2
    require_unassigned: true
    max_journal_entries: 1
    max_issues: 50

# Ordered list: first = primary. Use llm_chain: [] to fall back to single LLM_* from .env only.
llm_chain:
  - name: ollama_local
    base_url: "http://localhost:11434/v1"
    model: "qwen3:latest"
    api_key_env: OLLAMA_API_KEY
    timeout_seconds: 240
    max_retries: 0
  - name: openai_cloud
    base_url: "https://api.openai.com/v1"
    model: "gpt-4o-mini"
    api_key_env: OPENAI_API_KEY
    timeout_seconds: 120
    max_retries: 0
  - name: openrouter
    base_url: "https://openrouter.ai/api/v1"
    model: "openai/gpt-4o-mini"
    api_key_env: OPENROUTER_API_KEY
    timeout_seconds: 120
    max_retries: 0
