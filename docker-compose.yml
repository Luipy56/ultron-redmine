# Default: bridge network. Outbound URLs use the container's stack (127.0.0.1 is the container,
# not the host). For same URLs as bare metal (localhost LLM, SSH tunnels on the host), use:
#   docker compose -f docker-compose.yml -f docker-compose.hostnet.yml up …
# See README "Docker (optional)".
services:
  ultron:
    # One bot container per host with this name; avoids a second `docker compose up` from
    # silently running another copy with the same token (change the name if you need two stacks).
    container_name: ultron-redmine-bot
    build: .
    working_dir: /app
    env_file:
      - .env
    environment:
      CONFIG_PATH: config.yaml
      ULTRON_STATE_DIR: /app/data
    volumes:
      - ./.env:/app/.env:ro
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
    restart: unless-stopped
    init: true
