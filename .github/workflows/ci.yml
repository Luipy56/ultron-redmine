name: CI

on:
  push:
    branches: [main, prod]
  pull_request:
    branches: [main, prod]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test
        run: |
          python -m pip install -U pip
          pip install -e '.[dev]'
          pytest -q

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Docker build
        run: docker build -t ultron-ci .

      - name: Smoke import (image)
        run: docker run --rm ultron-ci python -c "from ultron.config import load_config; print('ok')"

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/prod'
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Rsync to server
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -eux
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.env' \
            --exclude 'data' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:/home/luipy/ultron/"

      - name: Remote install
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh -o StrictHostKeyChecking=yes "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'set -e; cd /home/luipy/ultron; test -d .venv || python3 -m venv .venv; .venv/bin/pip install -U pip -q; .venv/bin/pip install -q -e .'
