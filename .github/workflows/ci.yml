name: CI

on:
  push:
    branches:
      - prod

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test
        run: |
          python -m pip install -U pip
          pip install -e '.[dev]'
          pytest -q

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Docker Compose build and smoke
        run: |
          set -eux
          docker compose -f docker-compose.ci.yml config -q
          docker compose -f docker-compose.ci.yml build
          docker compose -f docker-compose.ci.yml run --rm --no-deps ultron python -c \
            "from pathlib import Path; from ultron.config import load_config; load_config(Path('config.yaml')); print('ok')"

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build]
    steps:
      - uses: actions/checkout@v4

      # Use the deploy key explicitly (-i). shimataro/ssh-key-action can fail to wire the identity for rsync on some runners.
      - name: Configure SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -eux
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          tr -d '\r' < ~/.ssh/deploy_key > ~/.ssh/deploy_key.tmp && mv ~/.ssh/deploy_key.tmp ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Rsync to server
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          HOST_PORT: ${{ secrets.HOST_PORT }}
        run: |
          set -eux
          SSH_PORT="${HOST_PORT:-22}"
          SSH=(ssh -i ~/.ssh/deploy_key -p "${SSH_PORT}" -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o BatchMode=yes)
          "${SSH[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" 'echo "ssh: ok"'
          rsync -avz -e "${SSH[*]}" --delete \
            --exclude '.git' \
            --exclude '.env' \
            --exclude 'data' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:/home/luipy/ultron/"

      - name: Remote install
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          HOST_PORT: ${{ secrets.HOST_PORT }}
        run: |
          set -eux
          SSH_PORT="${HOST_PORT:-22}"
          SSH=(ssh -i ~/.ssh/deploy_key -p "${SSH_PORT}" -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o BatchMode=yes)
          "${SSH[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'set -e; cd /home/luipy/ultron; test -d .venv || python3 -m venv .venv; .venv/bin/pip install -U pip -q; .venv/bin/pip install -q -e .'
